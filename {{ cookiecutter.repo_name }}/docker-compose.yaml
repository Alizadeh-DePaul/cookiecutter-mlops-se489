version: '3.8'

services:
  {{ cookiecutter.repo_name }}:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    container_name: {{ cookiecutter.repo_name }}_app
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
